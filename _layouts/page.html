---
layout: base
---
<article class="page-content">
  <header class="page-header">
    <div class="page-container">
      {% if page.cover %}
      <figure class="page-hero">
        <img src="{{ page.cover | relative_url }}" alt="{{ page.title }}">
      </figure>
      {% endif %}
      <h1 class="page-title">{{ page.title }}</h1>
    </div>
  </header>

  <div class="page-body">
    <div class="page-container">
      {{ content }}
    </div>
  </div>
</article>
