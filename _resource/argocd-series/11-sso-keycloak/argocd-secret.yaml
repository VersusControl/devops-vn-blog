# Chapter 11 — the Keycloak client secret, referenced from argocd-cm as
# $oidc.keycloak.clientSecret. Seal this in production (see chapter 8).
apiVersion: v1
kind: Secret
metadata:
  name: argocd-secret
  namespace: argocd
type: Opaque
stringData:
  oidc.keycloak.clientSecret: <client-secret-from-keycloak>
