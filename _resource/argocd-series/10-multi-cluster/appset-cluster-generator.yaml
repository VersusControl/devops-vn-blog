# Chapter 10 — Cluster generator: deploy Book Info to every production cluster.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: book-info-all-clusters
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - clusters:
        selector:
          matchLabels:
            environment: production
  template:
    metadata:
      name: 'book-info-{{ .name }}'
    spec:
      project: default
      source:
        repoURL: 'https://github.com/hoalongnatsu/argocd-series'
        targetRevision: HEAD
        path: '06-kustomize/book-info/overlays/prod'
      destination:
        server: '{{ .server }}'
        namespace: book-info
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
