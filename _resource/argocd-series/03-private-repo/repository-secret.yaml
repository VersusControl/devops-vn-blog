# Chapter 3 — register a private repo as a Secret (GitOps-friendly).
# The Secret must live in the argocd namespace and carry the
# argocd.argoproj.io/secret-type: repository label.
#
# Do NOT commit a real token in plain text — use the ExternalSecret variant
# (repository-externalsecret.yaml) or a SealedSecret in production.
apiVersion: v1
kind: Secret
metadata:
  name: private-repo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  type: git
  url: https://github.com/hoalongnatsu/private-microservice-book-info
  username: <your-access-token>
  password: git
