# Chapter 3 — register a private repo without storing the token in Git, using
# the External Secrets Operator backed by AWS Secrets Manager.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: private-repo
  namespace: argocd
spec:
  secretStoreRef:
    name: aws
    kind: ClusterSecretStore
  target:
    name: private-repo
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
  data:
    - secretKey: username
      remoteRef:
        key: aws/git/application-argo
        property: username
    - secretKey: password
      remoteRef:
        key: aws/git/application-argo
        property: password
    - secretKey: url
      remoteRef:
        key: aws/git/application-argo
        property: repository
