# Chapter 8 — a SealedSecret. The encryptedData below is safe to commit; only the
# in-cluster sealed-secrets controller can decrypt it into a real Secret.
# Generate your own with:
#   kubectl create secret generic db-credentials \
#     --from-literal=password=secretpassword --dry-run=client -o yaml \
#   | kubeseal --controller-name sealed-secrets \
#     --controller-namespace kube-system --format yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: db-credentials
  namespace: default
spec:
  encryptedData:
    password: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEQAx... # example ciphertext
  template:
    metadata:
      name: db-credentials
    type: Opaque
