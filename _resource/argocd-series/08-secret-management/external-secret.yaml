# Chapter 8 — an ExternalSecret that syncs a value from AWS Secrets Manager into a
# real Kubernetes Secret. Only this reference lives in Git, never the value.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets
    kind: SecretStore
  target:
    name: db-credentials
  data:
    - secretKey: password
      remoteRef:
        key: prod/book-info/db
        property: password
